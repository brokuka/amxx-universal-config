name: build

# Compile the plugin and attach the .amxx to a GitHub Release whenever a
# version tag (e.g. v1.6.1) is pushed.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to upload release assets

env:
  PLUGIN: universal_config

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup amxxpc
        uses: wopox1337/setup-amxxpawn@v1.1.0   # archived but pinned & stable
        with:
          version: '1.9.x'

      - name: Compile
        run: |
          amxxpc scripting/$PLUGIN.sma -iscripting/include -o$PLUGIN.amxx
          test -f $PLUGIN.amxx

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN }}-amxx
          path: ${{ env.PLUGIN }}.amxx

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN }}.amxx
